  title = "Jose Agudelo"

  [en.params]
    description = "Philosopher, digital humanist, data scientist."
    bio = """
I am a philosopher with training in digital humanities and data science.
My work moves between political and social philosophy, critical theory,
philosophy of technology and AI, and natural language processing.
"""

    [en.params.author]
      name = "Jose Agudelo Londoño"
