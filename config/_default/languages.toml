[es]
  weight = 1
  languageName = "Español"
  title = "Jose Agudelo"

  [es.params]
    description = "Filósofo, humanista digital, data scientist."
    bio = """
Soy filósofo con formación en humanidades digitales y ciencia de datos.
Mi trabajo se mueve entre la filosofía política y social, la teoría crítica,
la filosofía de la tecnología y la inteligencia artificial, y el procesamiento
de lenguaje natural.

Actualmente trabajo en la intersección entre representación del conocimiento e
IA, y filosofía teórica en realismo, ontología social e individuación.
"""

    [es.params.author]
  name = "Jose Agudelo Londoño"
  headline = "Humanista digital. Con formación en filosofía, experiencia en comunicación e iniciando en ciencia de datos."
  image = "img/avatar.jpg"
  links = [
    { github = "https://github.com/jagudelol" },
    { orcid = "https://orcid.org/0009-0001-9147-0061" },
    { email = "mailto:tu@correo.com" }
  ]

[en]
  weight = 2
